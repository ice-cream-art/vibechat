services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-demo}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.deepseek.com}
      OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-v4-pro}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      CORS_ORIGIN_REGEX: ${CORS_ORIGIN_REGEX:-^https?://.*$}

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: /_/backend
        NEXT_PUBLIC_CHAT_API_URL: /_/backend
        NEXT_PUBLIC_WS_URL: ""
        NEXT_PUBLIC_TTS_API_URL: ""
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./deploy/alicloud/nginx.conf:/etc/nginx/conf.d/default.conf:ro
