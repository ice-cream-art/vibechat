services:
  backend:
    build: ./backend
    environment:
      LLM_PROVIDER: demo
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL: ws://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

