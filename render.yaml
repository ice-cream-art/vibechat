services:
  - type: web
    name: vibechat-api-ice-cream-art
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: demo
      - key: CORS_ORIGIN_REGEX
        value: https://.*\.vercel\.app
      - key: PYTHON_VERSION
        value: 3.13.4
